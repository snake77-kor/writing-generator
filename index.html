<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSAT Gen - 수능 영어 변형문제 생성기</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="app.js?v=5" defer></script>
</head>

<body>
    <header class="app-header">
        <div class="brand">
            <span>CSAT Gen</span>
            <span class="badge">BETA</span>
        </div>
        <nav class="main-tabs">
            <button class="main-tab-btn active" data-target="tab-source">1. 지문 관리</button>
            <button class="main-tab-btn" data-target="tab-generate">2. 문제 생성</button>
        </nav>
        <button id="api-setting-btn" class="btn-setting">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"></circle>
                <path
                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                </path>
            </svg>
            설정
        </button>
    </header>

    <main class="app-body">
        <!-- Tab 1: Source Manager -->
        <section id="tab-source" class="section-tab active">
            <div class="source-manager-container">
                <!-- File Upload (Mini) -->
                <div id="drop-zone" class="file-upload-container" style="padding: 2rem; margin-bottom: 2rem;">
                    <span class="upload-icon" style="font-size: 2rem; margin-bottom: 0.5rem;">📂</span>
                    <h3>파일로 지문 추가하기</h3>
                    <p style="color:#64748b; font-size: 0.9rem;">PDF 또는 TXT 파일을 업로드하면 자동으로 개별 지문으로 추가됩니다.</p>
                    <input type="file" id="file-input" accept=".pdf,.txt" multiple hidden>
                </div>

                <!-- Passages List -->
                <div id="passages-list" class="passages-list">
                    <!-- Cards will be injected here -->
                </div>

                <!-- Add New Passage Button -->
                <div id="add-passage-btn" class="add-passage-area">
                    <button class="btn-add-passage">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        직접 지문 추가하기
                    </button>
                </div>
            </div>
        </section>

        <!-- Tab 2: Generator -->
        <section id="tab-generate" class="section-tab">
            <div class="filter-bar" id="type-tabs"></div>

            <div class="result-header">
                <div>
                    <h3 id="current-type-title" style="margin-bottom:0.2rem">통합형 (전체 생성)</h3>
                    <p style="font-size:0.85rem; color:#64748b">등록된 지문을 바탕으로 문제가 생성됩니다.</p>
                </div>
                <div class="actions">
                    <button id="generate-btn" class="btn-primary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M21 12a9 9 0 1 1-6.219-8.56" />
                            <path d="M22 22 12 12" />
                        </svg>
                        문제 생성
                    </button>
                    <button id="download-html-btn" class="btn-ghost" title="HTML 저장">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                    </button>
                    <button id="download-pdf-btn" class="btn-ghost" title="PDF 저장">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="7 10 12 15 17 10" />
                            <line x1="12" y1="15" x2="12" y2="3" />
                        </svg>
                    </button>
                    <button id="copy-btn" class="btn-ghost" title="텍스트 복사">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                        </svg>
                    </button>
                </div>
            </div>

            <div id="result-view" class="result-content">
                <div class="placeholder-state"
                    style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#94a3b8;">
                    <p>1. [지문 관리] 탭에서 하나 이상의 지문을 등록하세요.</p>
                    <p>2. 원하는 유형을 선택한 뒤 [문제 생성]을 누르세요.</p>
                </div>
            </div>
        </section>
    </main>

    <!-- API Key Modal -->
    <div id="api-modal" class="modal hidden">
        <div class="modal-content">
            <h3>OpenAI API 설정</h3>
            <p>고품질 문제 생성을 위해 API 키가 필요합니다.<br>키는 브라우저에만 저장됩니다.</p>
            <input type="password" id="api-key-input" placeholder="sk-...">
            <div class="modal-actions">
                <button id="cancel-api-btn" class="btn-ghost">취소</button>
                <button id="save-api-btn" class="btn-primary">저장</button>
            </div>
        </div>
    </div>
</body>

</html>
