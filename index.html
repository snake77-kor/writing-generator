<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSAT Gen - Passage Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <!-- PDF.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
</head>

<body>

    <header>
        <div class="logo"><i class="fas fa-brain"></i> CSAT Gen <span class="badge">BETA</span></div>
        <div class="main-nav">
            <div id="nav-input" class="nav-item active" onclick="switchTab('input')">1. 지문 관리</div>
            <div id="nav-generate" class="nav-item" onclick="switchTab('generate')">2. 문제 생성</div>
        </div>
        <button class="settings-btn" onclick="resetKey()"><i class="fas fa-cog"></i> 설정</button>
    </header>

    <main>
        <!-- Tab 1: 지문 관리 -->
        <div id="tab-input" class="tab-content active">
            <div class="manage-container">

                <!-- Hidden File Input -->
                <input type="file" id="file-input" accept=".txt,.pdf" multiple style="display:none"
                    onchange="handleFileUpload(this)">

                <!-- File Upload Box (Top) -->
                <div class="file-upload-box" onclick="document.getElementById('file-input').click()">
                    <i class="fas fa-folder-open file-icon"></i>
                    <div class="file-title">파일로 지문 추가하기</div>
                    <div class="file-desc">PDF 또는 TXT 파일을 선택하면 자동으로 지문이 추가됩니다.</div>
                </div>

                <!-- Input List (Middle - New items will be added here) -->
                <div id="input-list">
                    <!-- Cards will be added here -->
                </div>

                <!-- Add Button (Bottom) -->
                <button class="add-btn" onclick="addInputBox()">
                    <i class="fas fa-plus"></i> 지문 추가하기
                </button>

            </div>
        </div>

        <!-- Tab 2: 문제 생성 -->
        <div id="tab-generate" class="tab-content">
            <div class="type-nav">
                <div class="type-pill active" onclick="selectType(this)"><i class="fas fa-star"
                        style="font-size:11px;"></i> 통합형</div>
                <div class="type-pill" onclick="selectType(this)">글의 목적</div>
                <div class="type-pill" onclick="selectType(this)">심경 변화</div>
                <div class="type-pill" onclick="selectType(this)">글의 주장</div>
                <div class="type-pill" onclick="selectType(this)">함축 의미</div>
                <div class="type-pill" onclick="selectType(this)">글의 요지</div>
                <div class="type-pill" onclick="selectType(this)">글의 주제</div>
                <div class="type-pill" onclick="selectType(this)">글의 제목</div>
                <div class="type-pill" onclick="selectType(this)">어법</div>
                <div class="type-pill" onclick="selectType(this)">어휘</div>
                <div class="type-pill" onclick="selectType(this)">빈칸 추론</div>
                <div class="type-pill" onclick="selectType(this)">무관한 문장</div>
                <div class="type-pill" onclick="selectType(this)">글의 순서</div>
                <div class="type-pill" onclick="selectType(this)">문장 넣기</div>
                <div class="type-pill" onclick="selectType(this)">요약문</div>
            </div>

            <div class="control-header">
                <div class="page-title">
                    <h2>통합형</h2>
                    <p>입력된 <span id="text-count-badge" style="font-weight:bold; color:#4f46e5;">1</span>개의 지문을 바탕으로 문제가
                        생성됩니다.</p>

                </div>

                <div class="action-group">
                    <button id="runBtn" class="ai-btn" onclick="runAI()">
                        <i class="fas fa-magic"></i> AI 문제 생성
                    </button>
                    <div class="sub-actions">
                        <button class="icon-btn" title="HTML로 저장" onclick="saveAsHTML()"><i
                                class="fas fa-save"></i></button>
                    </div>
                </div>
            </div>

            <hr style="border:0; border-top:1px solid #eee; margin-bottom:30px;">

            <div id="loading" class="loader">
                <i class="fas fa-spinner fa-spin fa-2x" style="margin-bottom:15px;"></i>
                <div id="statusText" style="font-weight:600;">AI 모델 탐색 중...</div>
            </div>

            <div id="empty-msg" style="text-align:center; padding:100px 0; color:#a0a3bd;">
                <i class="fas fa-inbox" style="font-size:48px; margin-bottom:20px; opacity:0.5;"></i><br>
                1. [지문 관리] 탭에서 지문을 입력하세요.<br>
                2. [AI 문제 생성] 버튼을 누르세요.
            </div>

            <div id="results-container"></div>
        </div>
    </main>

    <script src="app.js" defer></script>
</body>

</html>
